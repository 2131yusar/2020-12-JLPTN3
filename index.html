<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N3 模擬試験 — 2020年12月</title>
<style>
  :root{
    --washi:#f7f3ea;
    --washi-deep:#efe7d6;
    --sumi:#252220;
    --sumi-soft:#5a534c;
    --vermilion:#bc4a3c;
    --vermilion-deep:#9c3a2f;
    --gold:#b6904a;
    --indigo:#33495c;
    --good:#3f7a5c;
    --bad:#bc4a3c;
    --line:#ddd3bd;
    --card:#fffdf8;
    --shadow: 0 1px 2px rgba(37,34,32,.06), 0 8px 24px rgba(37,34,32,.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family: "Hiragino Mincho ProN","Yu Mincho","Noto Serif JP", "Zen Old Mincho", serif;
    background:
      radial-gradient(1200px 600px at 85% -10%, #fbf6e9 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #f3ead2 0%, transparent 55%),
      var(--washi);
    color:var(--sumi);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .stage{
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 18px 80px;
  }

  /* ===== Header / cover ===== */
  .cover{
    position:relative;
    border-radius:18px;
    padding: 34px 28px 28px;
    background: linear-gradient(160deg, var(--indigo) 0%, #233140 100%);
    color: #f4ead0;
    overflow:hidden;
    box-shadow: var(--shadow);
    margin-bottom: 22px;
  }
  .cover::before{
    content:"";
    position:absolute; inset:0;
    background-image: radial-gradient(circle at 1px 1px, rgba(244,234,208,.10) 1px, transparent 1px);
    background-size: 16px 16px;
    opacity:.5;
  }
  .cover .kicker{
    position:relative;
    font-family: "Zen Kaku Gothic New","Noto Sans JP",sans-serif;
    letter-spacing:.18em;
    font-size:11px;
    text-transform:uppercase;
    color: var(--gold);
    margin-bottom:10px;
  }
  .cover h1{
    position:relative;
    font-size: 30px;
    margin: 0 0 6px;
    line-height:1.35;
    font-weight: 600;
  }
  .cover h1 .accent{ color:#e8b96a; }
  .cover p.sub{
    position:relative;
    font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;
    font-size: 13.5px;
    color:#cdd9e2;
    margin: 0 0 22px;
    line-height:1.7;
  }
  .cover .stamp{
    position:absolute;
    top:22px; right:24px;
    width:62px;height:62px;
    border:2px solid var(--vermilion);
    border-radius:8px;
    color:var(--vermilion);
    display:flex;align-items:center;justify-content:center;
    font-size:22px;
    font-weight:700;
    transform: rotate(-6deg);
    background: rgba(188,74,60,.07);
  }
  .cover .meta-row{
    position:relative;
    display:flex; gap:18px; flex-wrap:wrap;
    font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;
    font-size:12.5px;
    color:#aebcc8;
    border-top:1px solid rgba(244,234,208,.18);
    padding-top:14px;
  }
  .cover .meta-row b{ color:#f4ead0; font-weight:600;}

  .start-btn{
    position:relative;
    margin-top:18px;
    display:inline-flex;
    align-items:center;
    gap:10px;
    background: var(--vermilion);
    color:#fff7ec;
    border:none;
    font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;
    font-weight:600;
    font-size:14.5px;
    padding: 13px 22px;
    border-radius: 999px;
    cursor:pointer;
    box-shadow: 0 6px 18px rgba(188,74,60,.35);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .start-btn:hover{ transform: translateY(-1px); box-shadow: 0 8px 22px rgba(188,74,60,.45); }
  .start-btn:active{ transform: translateY(0); }

  /* ===== Progress ===== */
  .progress-wrap{
    position: sticky; top:0; z-index:20;
    background: linear-gradient(var(--washi) 78%, transparent);
    padding: 10px 0 14px;
    margin-bottom: 6px;
  }
  .progress-info{
    display:flex; justify-content:space-between; align-items:baseline;
    font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;
    font-size:12px; color:var(--sumi-soft);
    margin-bottom:6px;
    padding: 0 2px;
  }
  .progress-info .sect-name{ color:var(--vermilion-deep); font-weight:700; letter-spacing:.02em;}
  .progress-track{
    height:6px; background:var(--washi-deep); border-radius:99px; overflow:hidden;
    border:1px solid var(--line);
  }
  .progress-fill{
    height:100%; width:0%;
    background: linear-gradient(90deg, var(--gold), var(--vermilion));
    border-radius:99px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }

  /* ===== Card ===== */
  .card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 26px 24px 22px;
    box-shadow: var(--shadow);
    animation: rise .35s ease;
  }
  @keyframes rise{
    from{ opacity:0; transform: translateY(8px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .card .section-desc{
    font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;
    font-size:12.5px;
    color: var(--sumi-soft);
    background: var(--washi-deep);
    border-left:3px solid var(--gold);
    padding:9px 12px;
    border-radius:6px;
    margin-bottom:18px;
    line-height:1.6;
  }
  .qnum{
    display:inline-flex; align-items:center; justify-content:center;
    min-width:30px; height:30px; padding:0 9px;
    background: var(--sumi);
    color: var(--washi);
    font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;
    font-size:13px; font-weight:700;
    border-radius:7px;
    margin-bottom:14px;
  }
  .qtext{
    font-size: 19px;
    line-height: 1.85;
    margin: 0 0 6px;
  }
  .qtext u{ text-decoration-color: var(--vermilion); text-decoration-thickness:2px; text-underline-offset:3px; }

  .passage{
    background: var(--washi-deep);
    border:1px solid var(--line);
    border-radius:10px;
    padding: 16px 18px;
    margin: 14px 0 18px;
    font-size:15.5px;
    line-height:1.95;
    max-height: 360px;
    overflow-y:auto;
  }
  .passage h4{ margin:0 0 10px; font-size:15px; color:var(--vermilion-deep); }
  .passage p{ margin:0 0 12px; }
  .passage p:last-child{ margin-bottom:0; }
  .passage .note{ font-size:12.5px; color:var(--sumi-soft); font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif; }
  .passage .boxed-passage{
    border:1px solid var(--sumi-soft); padding:14px; border-radius:6px; background:var(--card);
  }
  .info-table{ width:100%; border-collapse:collapse; font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif; font-size:12.5px; margin-top:8px;}
  .info-table th,.info-table td{ border:1px solid var(--line); padding:6px 8px; text-align:center; }
  .info-table th{ background: var(--card); }

  .order-hint{
    font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;
    font-size:11.5px; color: var(--gold); margin: -6px 0 14px;
  }

  .options{ display:flex; flex-direction:column; gap:10px; margin-top:14px; }
  .opt{
    display:flex; align-items:flex-start; gap:12px;
    border:1.5px solid var(--line);
    border-radius:11px;
    padding: 13px 15px;
    cursor:pointer;
    background:#fffefb;
    transition: border-color .15s ease, background .15s ease, transform .1s ease;
    font-size:15.5px;
    line-height:1.6;
  }
  .opt:hover{ border-color: var(--gold); background: #fffaf0; }
  .opt .badge{
    flex:0 0 auto;
    width:26px;height:26px;
    border-radius:50%;
    border:1.5px solid var(--sumi-soft);
    display:flex;align-items:center;justify-content:center;
    font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;
    font-size:13px; font-weight:700; color:var(--sumi-soft);
    margin-top:1px;
  }
  .opt.selected{
    border-color: var(--indigo);
    background: #eef3f6;
  }
  .opt.selected .badge{ background:var(--indigo); border-color:var(--indigo); color:#fff; }

  .opt.correct{ border-color: var(--good); background: #eef6f0; }
  .opt.correct .badge{ background:var(--good); border-color:var(--good); color:#fff; }
  .opt.incorrect{ border-color: var(--bad); background: #faeeec; }
  .opt.incorrect .badge{ background:var(--bad); border-color:var(--bad); color:#fff; }
  .opt.disabled{ cursor:default; }

  .feedback{
    margin-top:16px;
    padding: 13px 15px;
    border-radius:10px;
    font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;
    font-size:13.5px;
    line-height:1.75;
    display:none;
  }
  .feedback.show{ display:block; animation: rise .25s ease; }
  .feedback.ok{ background:#eef6f0; border:1px solid var(--good); color:#234a37; }
  .feedback.ng{ background:#faeeec; border:1px solid var(--bad); color:#6e2a21; }
  .feedback .tag{ font-weight:700; margin-right:6px; }

  /* ===== Nav ===== */
  .navbar{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:22px;
    font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;
  }
  .nav-btn{
    border:1.5px solid var(--sumi);
    background:transparent;
    color:var(--sumi);
    padding: 10px 18px;
    border-radius:999px;
    font-size:13.5px; font-weight:600;
    cursor:pointer;
    transition: all .15s ease;
  }
  .nav-btn:hover:not(:disabled){ background:var(--sumi); color:var(--washi); }
  .nav-btn:disabled{ opacity:.3; cursor:not-allowed; }
  .nav-btn.primary{
    border-color: var(--vermilion);
    background: var(--vermilion);
    color:#fff7ec;
  }
  .nav-btn.primary:hover{ background: var(--vermilion-deep); }

  .jumpbar{
    display:flex; flex-wrap:wrap; gap:6px;
    margin-top:18px;
    justify-content:center;
  }
  .jumpbar button{
    width:30px;height:30px;
    border-radius:7px;
    border:1px solid var(--line);
    background:var(--card);
    font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;
    font-size:11px;
    color:var(--sumi-soft);
    cursor:pointer;
  }
  .jumpbar button.cur{ border-color:var(--indigo); color:var(--indigo); font-weight:700;}
  .jumpbar button.done-ok{ background:#eef6f0; border-color:var(--good); color:var(--good); }
  .jumpbar button.done-ng{ background:#faeeec; border-color:var(--bad); color:var(--bad); }

  /* ===== Result ===== */
  .result-card{
    background: var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding: 34px 28px;
    text-align:center;
    box-shadow:var(--shadow);
  }
  .result-card .ring{
    width:150px;height:150px;
    margin: 6px auto 18px;
    position:relative;
  }
  .result-card .ring svg{ transform: rotate(-90deg); }
  .result-card .ring .pct{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column;
  }
  .result-card .ring .pct b{ font-size:30px; line-height:1; }
  .result-card .ring .pct span{ font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif; font-size:11px; color:var(--sumi-soft); margin-top:4px;}
  .result-card h2{ margin:0 0 4px; font-size:22px; }
  .result-card .comment{
    font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;
    font-size:13.5px; color:var(--sumi-soft); margin-bottom:20px;
  }
  .breakdown{
    display:grid; grid-template-columns: repeat(2,1fr); gap:10px;
    margin: 18px 0 24px;
    font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;
  }
  .breakdown .bd-item{
    border:1px solid var(--line); border-radius:10px; padding:10px 12px; text-align:left;
    font-size:12px;
  }
  .breakdown .bd-item .label{ color:var(--sumi-soft); margin-bottom:4px;}
  .breakdown .bd-item .val{ font-size:16px; font-weight:700; }
  .breakdown .bd-item .val.ok{ color:var(--good); }
  .breakdown .bd-item .val.ng{ color:var(--bad); }

  .result-actions{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }

  .review-list{ text-align:left; margin-top:26px; }
  .review-item{
    border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:10px;
  }
  .review-item .rq{ font-size:14.5px; margin-bottom:6px; }
  .review-item .ra{ font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif; font-size:12px; }
  .review-item .ra.ok{ color:var(--good); }
  .review-item .ra.ng{ color:var(--bad); }

  .hidden{ display:none !important; }

  @media (max-width:480px){
    .cover h1{ font-size:23px; }
    .cover .stamp{ width:48px;height:48px; font-size:16px; top:16px; right:16px;}
    .qtext{ font-size:17px; }
    .card{ padding:20px 16px 18px; }
    .breakdown{ grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="stage">

  <!-- ===== COVER ===== -->
  <div id="cover" class="cover">
    <div class="stamp">N3</div>
    <div class="kicker">Interactive Mock Exam</div>
    <h1>日本語能力試験<br><span class="accent">N3 模擬問題</span> — 2020年12月</h1>
    <p class="sub">文字・語彙・文法・読解の全16セクション、全73問（各パートの番号は1から再スタートします）。一問ずつ答えて、その場で解説を確認できます。最後にスコアと振り返りが出ます。（聴解は音声がないため対象外）</p>
    <div class="meta-row">
      <div><b>73問</b> 全問</div>
      <div><b>16</b> セクション</div>
      <div>制限時間 <b>なし</b>（自分のペースで）</div>
    </div>
    <button class="start-btn" onclick="startQuiz()">▶ はじめる</button>
  </div>

  <!-- ===== QUIZ ===== -->
  <div id="quizArea" class="hidden">
    <div class="progress-wrap">
      <div class="progress-info">
        <span class="sect-name" id="sectName">問題1</span>
        <span id="progressText">1 / 66</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="card" id="card"></div>

    <div class="navbar">
      <button class="nav-btn" id="prevBtn" onclick="goPrev()">← 前へ</button>
      <button class="nav-btn primary" id="nextBtn" onclick="goNext()">次へ →</button>
    </div>

    <div class="jumpbar" id="jumpbar"></div>
  </div>

  <!-- ===== RESULT ===== -->
  <div id="resultArea" class="hidden">
    <div class="result-card">
      <div class="ring">
        <svg width="150" height="150" viewBox="0 0 150 150">
          <circle cx="75" cy="75" r="64" fill="none" stroke="#efe7d6" stroke-width="12"/>
          <circle id="ringFg" cx="75" cy="75" r="64" fill="none" stroke="#bc4a3c" stroke-width="12" stroke-linecap="round" stroke-dasharray="402" stroke-dashoffset="402"/>
        </svg>
        <div class="pct"><b id="scorePct">0%</b><span id="scoreFrac">0 / 66</span></div>
      </div>
      <h2 id="resultTitle">お疲れ様でした</h2>
      <p class="comment" id="resultComment"></p>

      <div class="breakdown" id="breakdown"></div>

      <div class="result-actions">
        <button class="nav-btn primary" onclick="showReview()">📖 全問の解説を見る</button>
        <button class="nav-btn" onclick="restartQuiz()">↻ もう一度挑戦する</button>
      </div>

      <div class="review-list hidden" id="reviewList"></div>
    </div>
  </div>

</div>

<script>
const SECTIONS = [
{
  id: "moji1",
  title: "文字語彙 問題1",
  desc: "＿＿のことばの読み方として最もよいものを、1・2・3・4から一つえらびなさい。",
  questions: [
    {n:1, q:"まず、この問題を<u>調査</u>します。", opts:["ちょうさ","ちょうさつ","ちょさ","ちょさつ"], ans:0, exp:"調査（ちょうさ）＝investigasi/survei. Bacaan baku, tanpa pemanjangan tambahan."},
    {n:2, q:"どんな<u>種類</u>がありますか。", opts:["しゅれい","じゅれい","しゅるい","じゅるい"], ans:2, exp:"種類（しゅるい）＝jenis/macam. 種＝しゅ（bukan じゅ）、類＝るい。"},
    {n:3, q:"この辺は<u>岩</u>が多い場所だ。", opts:["かい","いわ","すな","どろ"], ans:1, exp:"岩（いわ）＝batu karang/batu besar. Bukan 貝(かい/kerang), 砂(すな/pasir), 泥(どろ/lumpur)."},
    {n:4, q:"たくさんの人と<u>交流</u>する。", opts:["ごうりゅ","ごうりゅう","こうりゅ","こうりゅう"], ans:3, exp:"交流（こうりゅう）＝pertukaran/interaksi. こう（bukan ごう）＋りゅう（dengan pemanjangan）。"},
    {n:5, q:"荷物はフロントに<u>預けて</u>おきました。", opts:["とどけて","あすけて","あずけて","とけて"], ans:2, exp:"預ける（あずける）＝menitipkan. Bukan 届ける(とどける/mengirim)."},
    {n:6, q:"わたしは、<u>普通</u>、7時に起きます。", opts:["ふうだん","ふうつう","ふだん","ふつう"], ans:3, exp:"普通（ふつう）＝biasanya/umumnya. Tanpa pemanjangan di awal."},
    {n:7, q:"理由もなく<u>疑って</u>はいけないと思う。", opts:["ことわって","うたがって","きらって","おこって"], ans:1, exp:"疑う（うたがう）＝mencurigai. Bukan 断る(ことわる/menolak), 嫌う(きらう/membenci), 怒る(おこる/marah)."},
    {n:8, q:"来週は旅行で家を<u>留守</u>にします。", opts:["るす","るしゅ","りゅうす","りゅうしゅ"], ans:0, exp:"留守（るす）＝tidak ada di rumah/menjaga rumah saat orang pergi."}
  ]
},
{
  id: "moji2",
  title: "文字語彙 問題2",
  desc: "＿＿のことばを漢字で書くとき、最もよいものを、1・2・3・4から一つえらびなさい。",
  questions: [
    {n:9, q:"それは<u>ぎゃく</u>ですよ。", opts:["途","迅","逆","造"], ans:2, exp:"逆（ぎゃく）＝kebalikan/terbalik."},
    {n:10, q:"あしたの朝は気温が<u>ひくく</u>なるそうです。", opts:["冷く","低く","底く","令く"], ans:1, exp:"低い（ひくい）＝rendah. Bukan 冷い(つめたい/dingin disentuh)."},
    {n:11, q:"授業で花の形や色を<u>かんさつ</u>しました。", opts:["観祭","視祭","観察","視祭"], ans:2, exp:"観察（かんさつ）＝observasi/pengamatan."},
    {n:12, q:"田村さんが手紙を読んで<u>ないて</u>いた。", opts:["恋いて","涙いて","悲いて","泣いて"], ans:3, exp:"泣く（なく）＝menangis. Pilihan lain bukan kata baku."},
    {n:13, q:"夜の11時<u>いこう</u>は、料金が高くなる。", opts:["以降","以向","移降","移向"], ans:0, exp:"以降（いこう）＝setelah/mulai dari (waktu tertentu)."},
    {n:14, q:"今は<u>ふくざつ</u>な気持ちだ。", opts:["復推","復雑","複推","複雑"], ans:3, exp:"複雑（ふくざつ）＝rumit/kompleks."}
  ]
},
{
  id: "moji3",
  title: "文字語彙 問題3",
  desc: "（　）に入れるのに最もよいものを、1・2・3・4から一つえらびなさい。",
  questions: [
    {n:15, q:"旅行中に町を歩いていたら、（　）学生時代の友人に会い、とても驚いた。", opts:["案外","せっかく","ついでに","偶然"], ans:3, exp:"偶然（ぐうぜん）＝secara kebetulan. Cocok untuk bertemu teman tanpa direncanakan."},
    {n:16, q:"森さんは明るくて（　）のある人だから、一緒に話していると、とても楽しい。", opts:["カロリー","アップ","ユーモア","レジャー"], ans:2, exp:"ユーモアのある人＝orang yang humoris. Pasangan kata tetap."},
    {n:17, q:"今度の旅行は、みんなから行きたい場所の（　）を聞いて、どこに行くかを決めます。", opts:["感覚","希望","意識","決心"], ans:1, exp:"希望（きぼう）を聞く＝menanyakan keinginan/harapan."},
    {n:18, q:"この物語に（　）する人たちは、全員女性だ。", opts:["登場","発生","外出","入門"], ans:0, exp:"登場する＝muncul/tampil (dalam cerita). 登場人物＝tokoh cerita."},
    {n:19, q:"さっき履いてみた靴は少し大きかったけど、この靴は（　）です。", opts:["けっきり","しっかり","ぴったり","そっくり"], ans:2, exp:"ぴったり＝pas/cocok ukurannya."},

  passage: `<h4>人気の店で並ぶこと</h4>
  <p style="text-align:right;font-size:13px;color:#5a534c;">デイビス ソフィア</p>
  <p>東京の街を歩いていると、飲食店の前にたくさんの人が並んでいるのをよく見ます。店に入るために<b>【19】</b>、有名な店なのかもしれませんが、長い時間待つのは時間がもったいないので、私はいつもすぐに入れる店を選んでいました。</p>
  <p>先週友達に、おいしいチーズケーキ屋があるから一緒に行こうと誘われました。人気がある店で、1時間ぐらい並ぶこともあるそうです。並ぶのは嫌いでしたが、暇だったし、私はチーズケーキが大好きなので、一緒に行くことにしました。店に着くと、やはりたくさんの人が並んでいました。<b>【20】</b>、友達と話しながら待っていたら、長い時間待ったとは感じませんでした。チーズケーキはとてもおいしかったです。翌日、ゼミの先輩に、人気のチーズケーキを食べたことを話しました。</p>
  <p>先輩に「いいなあ。私も今度行ってみよう。」と<b>【21】</b>、うれしかったです。</p>
  <p>私が食べたチーズケーキは本当においしかったです。人気の店に並んで待つ気持ちが少しわかりました。また機会があったら、<b>【22】</b>人気店でも並んでみたいです。</p>`,

    {n:19, q:"【19】", opts:["待つことです","待ちにくいからです","待ったところです","待っているのです"], ans:3, exp:"店に入るために待っているのです＝（itu artinya） mereka sedang menunggu untuk masuk ke toko. Menjelaskan alasan banyak orang antre."},
    {n:20, q:"【20】", opts:["でも","また","つまり","そのうえ"], ans:0, exp:"でも＝tetapi/namun. Kontras antara 'malas antre' dengan kenyataan tidak terasa lama karena ngobrol dengan teman."},
    {n:21, q:"【21】", opts:["言えて","言われて","言ってきて","言ってくれて"], ans:1, exp:"言われて（bentuk pasif）＝dikatakan (oleh senior). '先輩に...と言われて、うれしかった'＝senang dikatakan begitu oleh senior."},
    {n:22, q:"【22】", opts:["その","どの","別の","チーズケーキの"], ans:2, exp:"別の人気店でも並んでみたい＝ingin coba antre juga di toko populer lain (selain toko cheesecake ini)."}

// ===== flatten questions with section info =====
const FLAT = [];
SECTIONS.forEach(sec=>{
  sec.questions.forEach((q, idx)=>{
    FLAT.push({
      ...q,
      sectionId: sec.id,
      sectionTitle: sec.title,
      sectionDesc: sec.desc,
      passage: sec.passage || null,
      isFirstInSection: idx === 0
    });
  });
});

let current = 0;
const answers = new Array(FLAT.length).fill(null); // selected option index
const answered = new Array(FLAT.length).fill(false);

function startQuiz(){
  document.getElementById('cover').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  buildJumpbar();
  renderQuestion();
}

function buildJumpbar(){
  const bar = document.getElementById('jumpbar');
  bar.innerHTML = '';
  FLAT.forEach((q,i)=>{
    const b = document.createElement('button');
    b.textContent = q.n;
    b.id = 'jump-'+i;
    b.onclick = ()=>{ current = i; renderQuestion(); };
    bar.appendChild(b);
  });
}

function updateJumpbar(){
  FLAT.forEach((q,i)=>{
    const b = document.getElementById('jump-'+i);
    b.className = '';
    if(i === current) b.classList.add('cur');
    if(answered[i]){
      if(answers[i] === q.ans) b.classList.add('done-ok');
      else b.classList.add('done-ng');
    }
  });
}

function renderQuestion(){
  const q = FLAT[current];
  document.getElementById('sectName').textContent = q.sectionTitle;
  document.getElementById('progressText').textContent = (current+1)+' / '+FLAT.length;
  document.getElementById('progressFill').style.width = ((current+1)/FLAT.length*100)+'%';

  const card = document.getElementById('card');
  let html = '';

  if(q.isFirstInSection){
    html += `<div class="section-desc"><b>${escapeHtml(q.sectionTitle)}</b> ― ${escapeHtml(q.sectionDesc)}</div>`;
  }
  if(q.passage){
    html += `<div class="passage">${q.passage}</div>`;
  }

  html += `<div class="qnum">問 ${q.n}</div>`;
  html += `<div class="qtext">${q.q}</div>`;
  if(q.order){
    html += `<div class="order-hint">※ ★ の位置に入る選択肢の番号を選んでください</div>`;
  }

  html += `<div class="options" id="optionsWrap">`;
  q.opts.forEach((opt, i)=>{
    html += `<div class="opt" data-idx="${i}" onclick="selectOption(${i})">
      <div class="badge">${i+1}</div>
      <div class="opt-text">${escapeHtml(opt)}</div>
    </div>`;
  });
  html += `</div>`;

  html += `<div class="feedback" id="feedback"></div>`;

  card.innerHTML = html;

  // restore state if already answered
  if(answered[current]){
    showFeedback(current, answers[current], false);
  }

  document.getElementById('prevBtn').disabled = (current === 0);
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = (current === FLAT.length-1) ? '結果を見る ✓' : '次へ →';

  updateJumpbar();
  window.scrollTo({top:0, behavior:'instant' in window ? 'instant':'auto'});
}

function escapeHtml(s){
  return s; // content is pre-authored; allow inline tags like <u> intentionally
}

function selectOption(i){
  if(answered[current]) return; // lock after first answer
  answers[current] = i;
  answered[current] = true;
  showFeedback(current, i, true);
  updateJumpbar();
}

function showFeedback(qIdx, selectedIdx, animate){
  const q = FLAT[qIdx];
  const opts = document.querySelectorAll('#optionsWrap .opt');
  opts.forEach(o=>{
    const idx = parseInt(o.dataset.idx);
    o.classList.add('disabled');
    if(idx === q.ans) o.classList.add('correct');
    else if(idx === selectedIdx) o.classList.add('incorrect');
    if(idx === selectedIdx) o.classList.add('selected');
  });

  const fb = document.getElementById('feedback');
  const isCorrect = selectedIdx === q.ans;
  fb.className = 'feedback show ' + (isCorrect ? 'ok':'ng');
  let orderNote = q.order ? `<br>並べ替え順: ${q.order}` : '';
  fb.innerHTML = `<span class="tag">${isCorrect ? '✓ 正解！' : '✗ 不正解'}</span>正解は「${q.ans+1}. ${escapeHtml(q.opts[q.ans])}」${orderNote}<br><br>${escapeHtml(q.exp)}`;
}

function goNext(){
  if(current === FLAT.length-1){
    showResult();
    return;
  }
  current++;
  renderQuestion();
}
function goPrev(){
  if(current === 0) return;
  current--;
  renderQuestion();
}

function showResult(){
  document.getElementById('quizArea').classList.add('hidden');
  document.getElementById('resultArea').classList.remove('hidden');

  const total = FLAT.length;
  const correct = FLAT.reduce((acc,q,i)=> acc + (answers[i]===q.ans?1:0), 0);
  const pct = Math.round(correct/total*100);

  document.getElementById('scorePct').textContent = pct+'%';
  document.getElementById('scoreFrac').textContent = correct+' / '+total;

  const circumference = 2*Math.PI*64;
  const offset = circumference - (pct/100)*circumference;
  const ring = document.getElementById('ringFg');
  ring.setAttribute('stroke-dasharray', circumference);
  ring.style.transition = 'stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)';
  setTimeout(()=>{ ring.setAttribute('stroke-dashoffset', offset); }, 100);

  let title, comment;
  if(pct >= 80){ title = '素晴らしい！合格圏内です'; comment = 'N3レベルの実力がしっかり身についています。この調子で本番も頑張ってください。'; }
  else if(pct >= 60){ title = 'もう少しで合格ライン'; comment = '基礎はできています。間違えた問題の解説を読んで、弱点を補強しましょう。'; }
  else if(pct >= 40){ title = '伸びしろがあります'; comment = '文法・語彙・読解のどこが弱いか、解説を見ながら確認してみましょう。'; }
  else { title = 'これからが本番です'; comment = '一つずつ解説を読んで、間違えたパターンを覚えていきましょう。継続が力になります。'; }
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultComment').textContent = comment;

  // breakdown per section
  const bd = document.getElementById('breakdown');
  bd.innerHTML = '';
  const secStats = {};
  SECTIONS.forEach(sec=>{ secStats[sec.id] = {title: sec.title, total:0, correct:0}; });
  FLAT.forEach((q,i)=>{
    secStats[q.sectionId].total++;
    if(answers[i]===q.ans) secStats[q.sectionId].correct++;
  });
  Object.values(secStats).forEach(s=>{
    const okClass = s.correct === s.total ? 'ok' : (s.correct === 0 ? 'ng' : '');
    bd.innerHTML += `<div class="bd-item">
      <div class="label">${escapeHtml(s.title)}</div>
      <div class="val ${okClass}">${s.correct} / ${s.total}</div>
    </div>`;
  });
}

function showReview(){
  const list = document.getElementById('reviewList');
  list.classList.remove('hidden');
  let html = '';
  FLAT.forEach((q,i)=>{
    const isCorrect = answers[i] === q.ans;
    const userAns = answers[i]===null ? '(未回答)' : (answers[i]+1)+'. '+q.opts[answers[i]];
    html += `<div class="review-item">
      <div class="rq"><b>問${q.n}.</b> ${q.q.replace(/<[^>]+>/g,'')}</div>
      <div class="ra ${isCorrect?'ok':'ng'}">${isCorrect?'✓':'✗'} あなたの答え: ${escapeHtml(userAns)} ｜ 正解: ${q.ans+1}. ${escapeHtml(q.opts[q.ans])}</div>
      <div class="ra" style="color:#5a534c; margin-top:4px;">${escapeHtml(q.exp)}</div>
    </div>`;
  });
  list.innerHTML = html;
  list.scrollIntoView({behavior:'smooth'});
}

function restartQuiz(){
  current = 0;
  for(let i=0;i<FLAT.length;i++){ answers[i]=null; answered[i]=false; }
  document.getElementById('resultArea').classList.add('hidden');
  document.getElementById('reviewList').classList.add('hidden');
  document.getElementById('reviewList').innerHTML='';
  document.getElementById('cover').classList.remove('hidden');
  window.scrollTo({top:0});
}

</script>
</body>
